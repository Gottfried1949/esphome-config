esphome:
  name: rpi-picow
  friendly_name: RPI-Picow

rp2040:
  board: rpipicow

# Logging aktivieren
logger:

# Home Assistant API mit Verschlüsselung
api:
  encryption:
    key: "xGSrk6k5wXMwPpbFs2Fxiv20WkIcPQP+lPq978dZMDY="

# OTA (erst USB-Flash nötig)
ota:
  - platform: esphome
    password: "471301ab2cbdc070aa5e92b67b2d14cb"

# WLAN Verbindung
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback AP, falls WLAN nicht verfügbar
  ap:
    ssid: "Rpi-Picow Fallback Hotspot"
    password: "kLVN66q13C5A"

# LED Output an GPIO 15
output:
  - platform: gpio
    pin: 15
    id: led_output
    inverted: false   # HIGH = LED leuchtet

# Globale Variablen
globals:
  - id: led_state
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: blink_interval
    type: float
    restore_value: yes
    initial_value: '1.0'   # Standard: 1 Sekunde

# Blink-Intervall
interval:
  - interval: 0.1s
    then:
      - lambda: |-
          static float counter = 0.0;
          counter += 0.1;
          if (counter >= id(blink_interval)) {
            id(led_state) = !id(led_state);
            if (id(led_state)) {
              id(led_output).turn_on();
            } else {
              id(led_output).turn_off();
            }
            counter = 0.0;
          }

# Home Assistant Slider für Blinkfrequenz
number:
  - platform: template
    name: "LED Blink Intervall"
    id: blink_interval_number
    min_value: 0.1
    max_value: 5.0
    step: 0.1
    unit_of_measurement: "s"
    set_action:
      - lambda: |-
          id(blink_interval) = x;
